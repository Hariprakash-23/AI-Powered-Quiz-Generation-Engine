<!DOCTYPE html>
<html>
<head>
    <title>Quiz Question</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4895ef;
            --success: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --danger: #f72585;
            --warning: #f8961e;
            --info: #2ec4b6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
            padding: 30px;
            margin-bottom: 30px;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--dark);
        }
        
        .card-header {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: -30px -30px 30px -30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .card-header i {
            font-size: 1.8rem;
        }
        
        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
            margin: 10px 5px;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.6);
        }
        
        .btn-lg {
            padding: 16px 36px;
            font-size: 1.1rem;
        }
        
        .btn-success {
            background: linear-gradient(90deg, var(--info), var(--success));
            box-shadow: 0 5px 15px rgba(76, 201, 240, 0.4);
        }
        
        .btn-success:hover {
            box-shadow: 0 8px 20px rgba(76, 201, 240, 0.6);
        }
        
        .mastery-badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--success), var(--info));
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            margin: 10px 5px;
        }
        
        .question-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        
        .options-container {
            margin: 20px 0;
        }
        
        .option {
            display: block;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .option:hover {
            background: rgba(67, 97, 238, 0.1);
            border-color: var(--accent);
        }
        
        .option.selected {
            background: rgba(67, 97, 238, 0.15);
            border-color: var(--primary);
        }
        
        footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .btn { width: 100%; margin: 10px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-question-circle"></i>
                <h2>Adaptive Quiz Session</h2>
            </div>
            
            <div class="text-center">
                <span class="mastery-badge">{{ question.topic }}</span>
                <span class="mastery-badge">Difficulty: {{ question.difficulty|round(1) }}</span>
                <span class="mastery-badge">Question {{ question_count }} of 5</span>
            </div>
            
            <div class="question-container">
                <h3>{{ question.text }}</h3>
                
                <form action="/answer" method="post">
                    <div class="options-container">
                        {% for option in question.options %}
                        <label class="option">
                            <input type="radio" name="response" value="{{ option }}" required>
                            {{ option }}
                        </label>
                        {% endfor %}
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-lg">
                            Submit Answer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Add option selection effect
        document.querySelectorAll('.option').forEach(option => {
            option.addEventListener('click', function() {
                // Remove selected class from all options
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                
                // Add selected class to clicked option
                this.classList.add('selected');
                
                // Check the radio input
                this.querySelector('input').checked = true;
            });
        });
        
        // Add animation to buttons
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-5px)';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
